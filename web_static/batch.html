<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NIKKE Simulator Batch Compare</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>編成一括比較</h1>
        <p id="catalogStatus">読み込み中</p>
      </div>
      <div class="run-actions">
        <a class="top-link" href="/b3">B3比較</a>
        <a class="top-link" href="/">通常ページ</a>
        <button id="runAllButton" class="primary-button" type="button">全編成を実行</button>
      </div>
    </header>

    <main class="batch-shell">
      <section class="batch-input-pane">
        <div class="pane-head">
          <h2>入力</h2>
          <button id="parseButton" class="ghost-button" type="button">読み込み</button>
        </div>

        <div class="batch-input-body">
          <label class="file-field">
            <span>ファイル</span>
            <input id="formationFile" type="file" accept=".txt,.csv,text/plain,text/csv">
          </label>
          <textarea id="formationText" class="formation-textarea" spellcheck="false" placeholder="Dummy B1,Dummy B2,スノーホワイト：ヘビーアームズ,Dummy B3,Dummy B3 2"></textarea>
          <div id="parseMessages" class="parse-messages"></div>
        </div>

        <div class="options-band batch-options">
          <h2>設定</h2>
          <div class="option-grid">
            <label>スキルLv<input id="skillLevel" type="number" min="1" max="10" value="10"></label>
            <label>敵コード
              <select id="enemyElement">
                <option value="None">None</option>
                <option value="Fire">Fire</option>
                <option value="Water">Water</option>
                <option value="Electric">Electric</option>
                <option value="Wind">Wind</option>
                <option value="Iron">Iron</option>
              </select>
            </label>
            <label>敵コア<input id="enemyCoreSize" type="number" step="0.1" value="3.0"></label>
            <label>敵サイズ<input id="enemySize" type="number" step="0.1" value="100"></label>
            <label>敵数<input id="enemyCount" type="number" min="1" step="1" value="1"></label>
            <label>バースト溜め仮定時間（秒）<input id="burstChargeTime" type="number" min="0" step="0.1" value="5.0"></label>
            <label>クラスト
              <select id="crustOperationMode">
                <option value="">None</option>
                <option value="maillard">Maillard</option>
                <option value="blanching">Blanching</option>
              </select>
            </label>
            <label class="check-label"><input id="partBreakMode" type="checkbox"> 部位破壊</label>
            <label class="check-label"><input id="specialMode" type="checkbox"> Special</label>
          </div>

          <div class="status-settings">
            <div class="status-settings-head">
              <h3>詳細ステータス</h3>
              <label class="check-label"><input id="statusEnabled" type="checkbox" checked disabled> 常時使用</label>
            </div>
            <div class="option-grid status-grid">
              <label>レベル<input id="statusLevel" type="number" min="1" max="1300" step="1" value="400"></label>
              <label>凸数<input id="statusLimitBreak" type="number" min="0" max="10" step="1" value="10"></label>
              <label>好感度
                <select id="statusBondLevel">
                  <option value="0">0</option>
                  <option value="10">10</option>
                  <option value="20">20</option>
                  <option value="30" selected>30</option>
                  <option value="40">40</option>
                </select>
              </label>
              <label>共通研究<input id="commonResearchLevel" type="number" min="0" step="1" value="0"></label>
              <label>コレクション
                <select id="collectionRarity">
                  <option value="">なし</option>
                  <option value="R">R</option>
                  <option value="SR">SR</option>
                </select>
              </label>
              <label>コレクションLv<input id="collectionLevel" type="number" min="0" max="15" step="1" value="0"></label>
              <label>キューブLv<input id="cubeLevel" type="number" min="0" max="15" step="1" value="0"></label>
            </div>
            <div class="research-grid">
              <div>
                <h4>クラス研究</h4>
                <label>火力型<input id="classResearchAttacker" type="number" min="0" step="1" value="0"></label>
                <label>防御型<input id="classResearchDefender" type="number" min="0" step="1" value="0"></label>
                <label>支援型<input id="classResearchSupporter" type="number" min="0" step="1" value="0"></label>
              </div>
              <div>
                <h4>企業研究</h4>
                <label>エリシオン<input id="companyResearchElysion" type="number" min="0" step="1" value="0"></label>
                <label>ミシリス<input id="companyResearchMissilis" type="number" min="0" step="1" value="0"></label>
                <label>テトラ<input id="companyResearchTetra" type="number" min="0" step="1" value="0"></label>
                <label>ピルグリム<input id="companyResearchPilgrim" type="number" min="0" step="1" value="0"></label>
                <label>アブノーマル<input id="companyResearchAbnormal" type="number" min="0" step="1" value="0"></label>
              </div>
            </div>
          </div>

          <div class="additional-buffs">
            <div class="additional-buffs-head">
              <h3>追加バフ</h3>
              <div class="buff-add-controls">
                <select id="additionalBuffType">
                  <option value="cooldown_reduction">CT短縮</option>
                  <option value="max_ammo_rate">装弾数バフ</option>
                  <option value="reload_speed_rate">リロード速度バフ</option>
                  <option value="elemental_buff">有利コードダメージバフ</option>
                </select>
                <button id="addBuffButton" class="icon-button" type="button" title="追加バフを追加">+</button>
              </div>
            </div>
            <div id="additionalBuffList" class="additional-buff-list"></div>
          </div>
        </div>

        <div class="bulk-replace">
          <div class="pane-head compact-head">
            <h2>一括置換</h2>
            <button id="bulkReplaceButton" class="ghost-button" type="button">適用</button>
          </div>
          <div class="bulk-replace-grid">
            <label>枠
              <select id="bulkSlot">
                <option value="0">1番目</option>
                <option value="1">2番目</option>
                <option value="2">3番目</option>
                <option value="3">4番目</option>
                <option value="4">5番目</option>
              </select>
            </label>
            <label>キャラ
              <select id="bulkCharacter"></select>
            </label>
          </div>
        </div>
      </section>

      <section class="batch-results-pane">
        <div class="pane-head">
          <h2>結果</h2>
          <span id="runStatus" class="status-pill">待機</span>
        </div>
        <div id="batchSummary" class="summary-grid">
          <div><span>編成数</span><strong>-</strong></div>
          <div><span>成功</span><strong>-</strong></div>
          <div><span>最高ダメージ</span><strong>-</strong></div>
        </div>
        <div id="batchRows" class="batch-result-list"></div>
      </section>
    </main>

    <script src="/static/status_calc.js"></script>
    <script src="/static/batch.js"></script>
  </body>
</html>
