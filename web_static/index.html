<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NIKKE Simulator</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>NIKKE Simulator</h1>
        <p id="catalogStatus">読み込み中</p>
      </div>
      <div class="run-actions">
        <a class="top-link" href="/b3">B3比較</a>
        <a class="top-link" href="/batch">一括比較</a>
        <button id="runAllButton" class="secondary-button" type="button">全編成実行</button>
        <button id="runButton" class="primary-button" type="button">選択編成を実行</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="library-pane">
        <div class="pane-head">
          <h2>キャラ一覧</h2>
          <div class="library-head-actions">
            <input id="searchInput" type="search" placeholder="名前 / 武器 / バースト">
            <button id="toggleLibraryButton" class="ghost-button" type="button">一覧を隠す</button>
          </div>
        </div>
        <div class="filter-row">
          <button class="filter-button active" type="button" data-filter="all">すべて</button>
          <button class="filter-button" type="button" data-filter="1">B1</button>
          <button class="filter-button" type="button" data-filter="2">B2</button>
          <button class="filter-button" type="button" data-filter="3">B3</button>
          <button class="filter-button" type="button" data-filter="dummy">ダミー</button>
          <div id="weaponFilter" class="catalog-filter catalog-icon-filter" data-filter-key="weaponType" data-filter-label="武器種"></div>
          <div id="elementFilter" class="catalog-filter catalog-icon-filter" data-filter-key="element" data-filter-label="属性"></div>
          <div id="squadFilter" class="catalog-filter catalog-icon-filter" data-filter-key="company" data-filter-label="企業"></div>
          <div id="classFilter" class="catalog-filter catalog-icon-filter" data-filter-key="class" data-filter-label="型"></div>
        </div>
        <div id="characterList" class="character-list"></div>
      </section>

      <section class="setup-pane">
        <div class="pane-head">
          <h2>編成</h2>
          <div class="formation-actions">
            <button id="toggleLibraryWideButton" class="ghost-button" type="button">一覧を隠す</button>
            <button id="addFormationButton" class="icon-button" type="button" title="編成を追加">+</button>
            <button id="copyFormationButton" class="ghost-button" type="button">コピー</button>
            <button id="deleteFormationButton" class="ghost-button danger-button" type="button">削除</button>
            <button id="clearFormationButton" class="ghost-button" type="button">クリア</button>
            <button id="exportFormationsButton" class="ghost-button" type="button">Export</button>
            <button id="importFormationsButton" class="ghost-button" type="button">Import</button>
            <input id="importFormationsInput" type="file" accept="application/json,.json" hidden>
          </div>
        </div>
        <div id="formationTabs" class="formation-tabs"></div>
        <div class="formation-name-row">
          <label>編成名<input id="formationNameInput" type="text"></label>
          <div class="formation-status-actions">
            <button id="openEquipmentStatusButton" class="ghost-button" type="button">装備ステータス</button>
            <button id="openOverloadStatusButton" class="ghost-button" type="button">オバロOP</button>
            <button id="applyMaxStatusPresetButton" class="ghost-button" type="button">装備MAX</button>
          </div>
        </div>
        <div id="formationSlots" class="formation-grid"></div>

        <div class="options-band">
          <h2>設定</h2>
          <div class="option-grid">
            <label>スキルLv<input id="skillLevel" type="number" min="1" max="10" value="10"></label>
            <label>敵コード
              <select id="enemyElement">
                <option value="None">None</option>
                <option value="Fire">Fire</option>
                <option value="Water">Water</option>
                <option value="Electric">Electric</option>
                <option value="Wind">Wind</option>
                <option value="Iron">Iron</option>
              </select>
            </label>
            <label>敵コアサイズ<input id="enemyCoreSize" type="number" step="0.1" value="3.0"></label>
            <label>敵サイズ<input id="enemySize" type="number" step="0.1" value="100"></label>
            <label>敵数<input id="enemyCount" type="number" min="1" step="1" value="1"></label>
            <label>バースト溜め時間（秒）<input id="burstChargeTime" type="number" min="0" step="0.1" value="5.0"></label>
            <label class="check-label"><input id="partBreakMode" type="checkbox"> 部位破壊有無</label>
            <label class="check-label"><input id="specialMode" type="checkbox"> スペシャル</label>
          </div>

          <div class="status-settings">
            <div class="status-settings-head">
              <h3>詳細ステータス</h3>
              <label class="check-label"><input id="statusEnabled" type="checkbox" checked disabled> 常時使用</label>
            </div>
            <div class="option-grid status-grid">
              <label>レベル<input id="statusLevel" type="number" min="1" max="1300" step="1" value="400"></label>
              <label>共通研究<input id="commonResearchLevel" type="number" min="0" step="1" value="0"></label>
            </div>
            <div class="research-grid">
              <div>
                <h4>クラス研究</h4>
                <label>火力型<input id="classResearchAttacker" type="number" min="0" step="1" value="0"></label>
                <label>防御型<input id="classResearchDefender" type="number" min="0" step="1" value="0"></label>
                <label>支援型<input id="classResearchSupporter" type="number" min="0" step="1" value="0"></label>
              </div>
              <div>
                <h4>企業研究</h4>
                <label>エリシオン<input id="companyResearchElysion" type="number" min="0" step="1" value="0"></label>
                <label>ミシリス<input id="companyResearchMissilis" type="number" min="0" step="1" value="0"></label>
                <label>テトラ<input id="companyResearchTetra" type="number" min="0" step="1" value="0"></label>
                <label>ピルグリム<input id="companyResearchPilgrim" type="number" min="0" step="1" value="0"></label>
                <label>アブノーマル<input id="companyResearchAbnormal" type="number" min="0" step="1" value="0"></label>
              </div>
            </div>
          </div>

          <div class="additional-buffs">
            <div class="additional-buffs-head">
              <h3>追加バフ</h3>
              <div class="buff-add-controls">
                <select id="additionalBuffType">
                  <option value="cooldown_reduction">CT短縮</option>
                  <option value="max_ammo_rate">装弾数バフ</option>
                  <option value="reload_speed_rate">リロード速度バフ</option>
                  <option value="elemental_buff">有利コードダメージバフ</option>
                </select>
                <button id="addBuffButton" class="icon-button" type="button" title="追加バフを追加">+</button>
              </div>
            </div>
            <div id="additionalBuffList" class="additional-buff-list"></div>
          </div>
        </div>
      </section>

      <section class="results-pane">
        <div class="pane-head">
          <h2>結果</h2>
          <span id="runStatus" class="status-pill">待機</span>
        </div>
        <div id="summary" class="summary-grid">
          <div><span>総ダメージ</span><strong>-</strong></div>
          <div><span>消費弾数</span><strong>-</strong></div>
          <div><span>実行時間</span><strong>-</strong></div>
        </div>
        <div id="rotationSummary" class="rotation-summary"></div>
        <div id="resultRows" class="result-list"></div>
      </section>
    </main>

    <div id="detailModal" class="modal" hidden>
      <div class="modal-backdrop" data-close-detail></div>
      <section class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
        <header class="detail-head">
          <div>
            <h2 id="detailTitle">詳細</h2>
            <p id="detailSubtitle"></p>
          </div>
          <button id="closeDetailButton" class="icon-button" type="button" title="閉じる">x</button>
        </header>
        <div class="detail-body">
          <section>
            <h3>180秒ダメージ</h3>
            <svg id="damageChart" viewBox="0 0 920 280" role="img"></svg>
          </section>
          <section>
            <h3>180秒の装弾数履歴</h3>
            <svg id="ammoChart" viewBox="0 0 920 220" role="img"></svg>
          </section>
          <section>
            <h3>攻撃発動タイミング</h3>
            <svg id="attackEventChart" viewBox="0 0 920 280" role="img"></svg>
          </section>
          <section>
            <h3>ダメージ内訳</h3>
            <div id="damageSummary" class="damage-summary"></div>
          </section>
          <section>
            <h3>バースト発動</h3>
            <div id="burstTimeline" class="event-timeline"></div>
          </section>
          <section>
            <h3>バフタイムライン</h3>
            <div id="buffTimeline" class="buff-timeline"></div>
          </section>
        </div>
      </section>
    </div>

    <div id="resultModal" class="b3-result-modal" hidden>
      <section class="b3-result-modal-panel" role="dialog" aria-modal="true" aria-labelledby="resultModalTitle">
        <header class="b3-result-modal-head">
          <div>
            <h2 id="resultModalTitle">シミュレーション結果</h2>
            <p id="resultModalSummary"></p>
          </div>
          <button id="closeResultModalButton" class="icon-button" type="button" title="閉じる">x</button>
        </header>
        <div id="resultModalRows" class="normal-result-modal-list"></div>
      </section>
    </div>

    <script src="/static/status_calc.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
